<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Astikan</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  
  <!-- Premium Styles -->
  <link rel="stylesheet" href="css/premium.css">
  
  <style>
    /* Loader for modular parts */
    #main-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      color: #1A56DB;
    }
  </style>
</head>
<body>

  <div id="main-loader">Loading Astikan...</div>

  <div id="app-root" style="display: none;">
    <!-- Partials will be loaded here -->
    <div id="header-part"></div>
    <div id="drawer-part"></div>
    
    <main id="screens-container">
      <div id="home-screen"></div>
      <div id="questions-screen"></div>
      <div id="visual-screen"></div>
      <div id="summary-screen"></div>
      <div id="savings-screen"></div>
      <div id="plan-screen"></div>
    </main>

    <div id="nav-part"></div>
  </div>

  <!-- Modular Parts Loader Script -->
  <script>
    async function loadPart(id, url) {
      try {
        const response = await fetch(url);
        const html = await response.text();
        document.getElementById(id).innerHTML = html;
      } catch (err) {
        console.error("Failed to load " + url, err);
      }
    }

    async function initApp() {
      const parts = [
        { id: 'header-part', url: 'parts/header.html' },
        { id: 'drawer-part', url: 'parts/drawer.html' },
        { id: 'nav-part', url: 'parts/bottom-nav.html' },
        { id: 'home-screen', url: 'screens/home.html' },
        { id: 'questions-screen', url: 'screens/questions.html' },
        { id: 'visual-screen', url: 'screens/visual.html' },
        { id: 'summary-screen', url: 'screens/summary.html' },
        { id: 'savings-screen', url: 'screens/savings.html' },
        { id: 'plan-screen', url: 'screens/plan.html' }
      ];

      await Promise.all(parts.map(p => loadPart(p.id, p.url)));
      
      // Remove loader and show app
      document.getElementById('main-loader').style.display = 'none';
      document.getElementById('app-root').style.display = 'block';
      
      // Initialize premium JS
      const script = document.createElement('script');
      script.src = 'js/premium.js';
      document.body.appendChild(script);
    }

    initApp();
  </script>
</body>
</html>
